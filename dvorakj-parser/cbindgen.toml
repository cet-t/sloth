# cbindgen config for the `ffi` feature C header.
# Generate with:
#   cbindgen --config cbindgen.toml --crate dvorakj-parser --output include/dvorakj_parser.h
#
# 方針A: Rust 型名 (`DjStatus`) をそのまま出力する。`[export] prefix` は設定
# しない（設定すると Rust 名の前にさらに付いて `DjDjStatus` になるため）。
language = "C"
include_guard = "DVORAKJ_PARSER_H"
autogen_warning = "/* Generated by cbindgen. Do not edit. */"

[enum]
prefix_with_name = true # enum 変数を DjStatus_Ok などにして名前衝突を回避
