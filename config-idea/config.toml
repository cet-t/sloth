# ============================================================
#  rmap レイアウト定義（TOML）
#  人が書く「正」のフォーマット。JSON は機械向けミラー。
#
#  モデルの直交性：
#    layer     = トリガキー → 出力 の写像（グリッド or 差分）
#    combos    = 同時押し（キー集合 → 出力、順不同）
#    sequences = 順押し（キー列   → 出力、順序あり）
#    states    = 修飾/IME などの状態 → アクティブ層の選択
#  状態は「どの層を選ぶか」だけを決め、層自体は入れ子しない。
# ============================================================

[meta]
name = "my-layout" # レイアウト名（UI 表示用）
keyboard = "us"    # us | jis — スキャンコード解決の基準
author = "cet-t"
version = "0.1"

# ------------------------------------------------------------
#  層（layers）
#  - grid で全体を書く、または inherit + override で差分だけ書く。
#  - トリガキー名は dvorakj 名（"a","1","space","enter","shift"…）。
#  - セルは「出力文字列」1 個（複数文字も可）。"" = 何も出さない。
# ------------------------------------------------------------

# 基本層（単打）
[layers.base]
grid = [
  [
    "`",
    "1",
    "2",
    "3",
    "4",
    "5",
    "6",
    "7",
    "8",
    "9",
    "0",
    "-",
    "+",
  ],
  [
    "q",
    "w",
    "e",
    "r",
    "t",
    "y",
    "u",
    "i",
    "o",
    "p",
    "[",
    "]",
    "\\",
  ],
  [
    "a",
    "s",
    "d",
    "f",
    "g",
    "h",
    "j",
    "k",
    "l",
    ";",
    "'",
  ],
  [
    "z",
    "x",
    "c",
    "v",
    "b",
    "n",
    "m",
    ",",
    ".",
    "/",
  ],
]

# Shift 層：base を引き、override を base と同じグリッド形式で指定
[layers.shift]
inherit = "base"

[layers.shift.override]
grid = [
  ["~", "!", "@", "#", "$", "%", "^", "&", "*", "(", ")", "_", "+"],
  ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "{", "}", "|"],
  ["A", "S", "D", "F", "G", "H", "J", "K", "L", ":", "\""],
  ["Z", "X", "C", "V", "B", "N", "M", "<", ">", "?"],
]

# IME オン時に使う層（例：かな配列のつもり）
[layers.kana]
grid = [
  [
    "1",
    "2",
    "3",
    "4",
    "5",
    "6",
    "7",
    "8",
    "9",
    "0",
    "-",
    "^",
    "\\",
  ],
  [
    "q",
    "w",
    "e",
    "r",
    "t",
    "y",
    "u",
    "i",
    "o",
    "p",
    "@",
    "[",
    "]",
  ],
  [
    "a",
    "s",
    "d",
    "f",
    "g",
    "h",
    "j",
    "k",
    "l",
    ";",
    ":",
  ],
  [
    "z",
    "x",
    "c",
    "v",
    "b",
    "n",
    "m",
    ",",
    ".",
    "/",
  ],
]

# ------------------------------------------------------------
#  同時押し（combo）
#  キーは「正規化順（ソート済）」で , 区切り。押下順は問わない。
#  "a,b" = A と B を同時に押したときの出力。修飾を含めてもよい。
# ------------------------------------------------------------
[combos]
"a,b" = "@"
"s,d" = "#"
"x,c" = "*"
"shift,k" = "K"

# ------------------------------------------------------------
#  順押し（sequence / prefix）
#  キーは「入力順」で , 区切り。D を押してから V を押したときの出力。
# ------------------------------------------------------------
[sequences]
"d,v" = "★"
"k,k" = "々"
"q,o" = "🌟"

# ------------------------------------------------------------
#  状態 → 層の選択（入れ子しない）
#  修飾や IME の on/off は「どの層をアクティブにするか」だけを決める。
# ------------------------------------------------------------
[states]
default = "base" # 何もないとき
ime_off = "base"
ime_on = "kana"
# shift は override 層。Shift 保持中は base に差分(shift)を適用する想定。
